# 终极修复版：系统自适应深浅模式 + 按钮图标切换 + 图片尺寸兼容
site_name: Extrautilities Mod Wiki
site_description: EU模组中文wiki文档
site_author: guiY
site_url: https://guiYMOU.github.io/ExtraUtilitiesWiki/

# 网页标签小图标
favicon: lightnin-alloy.png

theme:
  name: material
  font: false
  features:
#    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - palette.toggle
    - navigation.instant
    - navigation.tracking
    - navigation.collapse
    - content.code.copy
    - navigation.tags
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换浅色模式


tags:
  - 原材料: items
  - 炮塔: building/turret

# 侧边栏导航（完全适配你之前的Wiki目录，无需改动文档）
nav:
  - 首页: index.md
  - 物品:
      - 物品主页: item/main.md
      - 物品:
          - 脆钢: item/crispSteel.md
          - 光束合金: item/lightninAlloy.md
          - 石头: item/stone.md
  - 建筑:
      - 全部建筑一览: building/main.md
      - 炮塔:
          - T2双管: building/turret/T2duo.md
          - T3双管: building/turret/T3duo.md
          - T2分裂: building/turret/T2scatter.md
          - T2火焰炮: building/turret/T2scorch.md


# 中文搜索适配
plugins:
  - search:
      lang: zh

# 完整扩展插件，兼容HTML图片属性
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.blocks.html

# 加载图片修复样式
extra_css:
  - css/fix-img-size.css

gh_deploy:
  nojekyll: true

extra:
  social:
    - icon: simple/github
      link: https://github.com/guiYMOU/mindustry-Extra-Utilities-mod
copyright: Copyright &copy; 2026 guiY — ExtraUtilities Mod