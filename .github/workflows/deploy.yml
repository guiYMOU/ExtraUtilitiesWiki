name: Deploy Wiki

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 关键修复：授予Actions写入仓库权限
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install MkDocs & 主题
        run: pip install mkdocs-material

      - name: Build & Deploy
        run: mkdocs gh-deploy --force
