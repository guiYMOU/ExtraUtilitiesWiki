name: Deploy Wiki

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs & 主题
        run: pip install mkdocs-material

      - name: Build & Deploy
        run: mkdocs gh-deploy --force